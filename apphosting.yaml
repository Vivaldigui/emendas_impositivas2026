runConfig:
  # Uma única instância sempre quente. Como o cache em memória do
  # dashboardService é por processo, duas instâncias = dois caches
  # independentes = requests roteados para a instância "fria" pagam
  # 30-60s de recompute. Para tráfego de Câmara municipal, 1 instância
  # com concurrency 80 dá conta de sobra.
  minInstances: 1
  maxInstances: 1
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: COLETA_ADMIN_SECRET
    secret: COLETA_ADMIN_SECRET
    availability:
      - RUNTIME
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
  - variable: IA_EMPENHO_ENABLED
    value: "true"
    availability:
      - BUILD
      - RUNTIME
  - variable: GEMINI_EMPENHO_MODEL
    value: "gemini-2.5-flash"
    availability:
      - BUILD
      - RUNTIME
  - variable: OPENAI_EMPENHO_TIMEOUT_MS
    value: "18000"
    availability:
      - BUILD
      - RUNTIME
  - variable: OPENAI_EMPENHO_MAX_RETRIES
    value: "1"
    availability:
      - BUILD
      - RUNTIME
